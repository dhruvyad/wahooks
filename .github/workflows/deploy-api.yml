name: Deploy API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/shared-types/**'

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  migrate:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DEPLOY_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Run migrations in-cluster
        run: |
          kubectl run migrate-$(echo ${{ github.sha }} | cut -c1-8) \
            --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --restart=Never \
            --namespace=default \
            --env="DATABASE_URL=$(kubectl get secret wahooks-api-secret -n default -o jsonpath='{.data.DATABASE_URL}' | base64 -d)" \
            --command -- node packages/db/scripts/migrate.cjs

          # Wait for migration job to complete
          kubectl wait --for=condition=Ready \
            pod/migrate-$(echo ${{ github.sha }} | cut -c1-8) \
            --namespace=default \
            --timeout=30s 2>/dev/null || true

          # Stream logs and check exit status
          kubectl logs --follow \
            migrate-$(echo ${{ github.sha }} | cut -c1-8) \
            --namespace=default

          # Check pod succeeded
          STATUS=$(kubectl get pod migrate-$(echo ${{ github.sha }} | cut -c1-8) -n default -o jsonpath='{.status.phase}')
          echo "Migration pod status: $STATUS"

          # Cleanup
          kubectl delete pod migrate-$(echo ${{ github.sha }} | cut -c1-8) -n default --ignore-not-found

          if [ "$STATUS" != "Succeeded" ]; then
            echo "Migration failed with status: $STATUS"
            exit 1
          fi

  deploy:
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DEPLOY_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Update API image and restart
        run: |
          kubectl set image deployment/wahooks-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --namespace default
          kubectl rollout status deployment/wahooks-api \
            --namespace default \
            --timeout=120s
