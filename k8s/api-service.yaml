# NodePort Service for the NestJS API.
# Caddy on the control-plane host proxies api.wahooks.com → 127.0.0.1:30001
#
# Update /etc/caddy/Caddyfile:
#   api.wahooks.com {
#     reverse_proxy 127.0.0.1:30001
#   }
apiVersion: v1
kind: Service
metadata:
  name: wahooks-api
  namespace: default
spec:
  type: NodePort
  selector:
    app: wahooks-api
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30001
