---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pause-pods
value: -1
globalDefault: false
description: "Low priority for buffer/pause pods — preempted when real pods need space"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: waha-buffer
  namespace: default
  labels:
    app: waha-buffer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waha-buffer
  template:
    metadata:
      labels:
        app: waha-buffer
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      priorityClassName: pause-pods
      terminationGracePeriodSeconds: 0
      containers:
      - name: pause
        image: registry.k8s.io/pause:3.9
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
